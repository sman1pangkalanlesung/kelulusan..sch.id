      padding: 0;

      flex-direction: column;
      align-items: center;
      justify-content: flex-start;

      color: #1e293b;
      position: relative;
      overflow-x: hidden;
    }

      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 9999;
    }

    .container {
      max-width: 580px;
      width: 100%;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);

      border-radius: 2.5rem;
      box-shadow: 0 25px 45px rgba(0,0,0,0.08), 0 10px 20px rgba(0,20,50,0.06);
      padding: 2rem 1.5rem 2.2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: all 0.2s ease;
      border: 1px solid rgba(255,255,255,0.6);
      position: relative;
      z-index: 1;
    }

    /* Logo - Dua logo bersebelahan */
    .logo-section {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 1.2rem;
      margin-bottom: 0.75rem;
      flex-wrap: wrap;
    }

    .logo-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
    }

    .logo-image {
      width: 85px;
      height: 85px;
      border-radius: 50%;
      object-fit: cover;
      box-shadow: 0 12px 22px rgba(2, 48, 71, 0.25);
      border: 3px solid #facc15;
      transition: transform 0.3s;
      background: #eaf0f6;
      display: block;
    }

    .logo-image:hover {
      transform: scale(1.05);
    }

    /* Nama Sekolah */
    .school-name {
      font-size: 2rem;
      font-weight: 800;
      text-align: center;
      color: #0b3b5c;
      margin: 0.5rem 0 0.3rem;
      line-height: 1.2;
      letter-spacing: -0.3px;
      text-shadow: 0 1px 2px rgba(255,255,255,0.8);
    }

    .sub-name {
      font-size: 1rem;
      font-weight: 500;
      color: #2c4b6b;
      background: #e6f0f9;
      display: inline-block;
      padding: 0.25rem 1.2rem;
      border-radius: 30px;
      margin-bottom: 1.3rem;
      letter-spacing: 0.4px;
    }

    /* Foto Guru */
    .teachers-photo {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0.6rem 0 1.2rem;
      width: 100%;
      gap: 0.5rem;
    }

    .single-teacher-photo {
      width: 100%;
      max-width: 400px;
      aspect-ratio: 16 / 9;
      border-radius: 1.5rem;
      object-fit: cover;
      box-shadow: 0 14px 24px rgba(0,0,0,0.2);
      border: 4px solid white;
      background: #d9e5f2;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      transition: transform 0.3s ease;
      display: block;
    }

    .single-teacher-photo:hover {
      transform: scale(1.01);
    }

    .divider {

      height: 3px;
      background: linear-gradient(to right, transparent, #9bb7d4, #2c5282, #9bb7d4, transparent);
      border-radius: 5px;
      margin: 0.8rem 0 1.8rem;

    .announcement-title {

      color: white;
      border-radius: 1.2rem;
      width: 100%;
      box-shadow: 0 6px 14px rgba(2, 48, 71, 0.2);
    }

    .announcement-title h2 {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: 0.3px;
      margin: 0;
      line-height: 1.4;
    }

    .announcement-title .subtitle {
      font-size: 0.8rem;
      font-weight: 400;
      opacity: 0.9;
      margin-top: 0.15rem;
      letter-spacing: 0.5px;

      border-radius: 3rem;
      padding: 0.4rem 0.4rem 0.4rem 1.4rem;
      display: flex;
      align-items: center;
      border: 1.5px solid #cfdfef;
      background: white;
      box-shadow: 0 6px 16px rgba(0,32,64,0.07);
      margin-bottom: 1.4rem;
      transition: border 0.2s;
    }

    .search-box:focus-within {
      border-color: #1e4a76;
      box-shadow: 0 0 0 4px rgba(30,74,118,0.15);
    }

    .search-box input {
      flex: 1;
      border: none;

      font-size: 1rem;
      background: transparent;
      outline: none;
      color: #0c2d44;

      }
      100% {

      color: #0f5c3b;
      background: #e3f5e9;
      padding: 0.4rem 1.4rem;
      border-radius: 2rem;
      display: inline-block;
      letter-spacing: 0.3px;
      opacity: 0;
      transition: opacity 0.4s ease;
      animation: fadeInUp 0.5s ease-out forwards;
    }

    @keyframes fadeInUp {
      0% {
        opacity: 0;
        transform: translateY(20px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    }

      // ========== KEMBANG API (FIREWORKS) ==========
      const canvas = document.getElementById('fireworksCanvas');
      const ctx = canvas.getContext('2d');
      
      let particles = [];
      let animationId = null;
      let isFireworksRunning = false;

      // Resize canvas
      function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      window.addEventListener('resize', resizeCanvas);
      resizeCanvas();

      // Warna-warni kembang api
      const colors = [
        '#FF6B6B', '#FFE66D', '#4ECDC4', '#45B7D1', '#96CEB4',
        '#FFEAA7', '#DDA0DD', '#98D8C8', '#F7DC6F', '#BB8FCE',
        '#FF1493', '#00CED1', '#FFD700', '#FF4500', '#7FFF00',
        '#FF69B4', '#00BFFF', '#FFA500', '#32CD32', '#FF6347'
      ];

      // Kelas Particle
      class Particle {
        constructor(x, y) {
          this.x = x;
          this.y = y;
          this.color = colors[Math.floor(Math.random() * colors.length)];
          this.velocity = {
            x: (Math.random() - 0.5) * 6,
            y: (Math.random() - 0.5) * 6
          };
          this.alpha = 1;
          this.decay = Math.random() * 0.02 + 0.015;
          this.size = Math.random() * 4 + 2;
          this.gravity = 0.05;
        }

        update() {
          this.velocity.y += this.gravity;
          this.x += this.velocity.x;
          this.y += this.velocity.y;
          this.alpha -= this.decay;
        }

        draw(ctx) {
          ctx.save();
          ctx.globalAlpha = this.alpha;
          ctx.fillStyle = this.color;
          ctx.shadowColor = this.color;
          ctx.shadowBlur = 10;
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }
      }

      function createExplosion(x, y, particleCount) {
        for (let i = 0; i < particleCount; i++) {
          particles.push(new Particle(x, y));
        }
      }

      function launchFirework() {
        const x = Math.random() * canvas.width;
        const y = Math.random() * (canvas.height * 0.6) + (canvas.height * 0.1);
        const particleCount = Math.floor(Math.random() * 80) + 40;
        createExplosion(x, y, particleCount);
      }

      function launchMultipleFireworks(count) {
        for (let i = 0; i < count; i++) {
          setTimeout(() => {
            if (isFireworksRunning) {
              launchFirework();
            }
          }, i * 200);
        }
      }

      function animate() {
        if (!isFireworksRunning) return;
        
        animationId = requestAnimationFrame(animate);
        
        ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        particles = particles.filter(p => p.alpha > 0);
        particles.forEach(p => {
          p.update();
          p.draw(ctx);
        });
        
        if (particles.length === 0 && !isFireworksRunning) {
          stopFireworks();
        }
      }

      function startFireworks() {
        stopFireworks();
        particles = [];
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        isFireworksRunning = true;
        
        launchMultipleFireworks(10);
        
        setTimeout(() => {
          if (isFireworksRunning) launchMultipleFireworks(8);
        }, 1500);
        
        setTimeout(() => {
          if (isFireworksRunning) launchMultipleFireworks(6);
        }, 3000);
        
        animate();
        
        setTimeout(() => {
          stopFireworks();
        }, 6000);
      }

      function stopFireworks() {
        isFireworksRunning = false;
        if (animationId) {
          cancelAnimationFrame(animationId);
          animationId = null;
        }
        setTimeout(() => {
          if (!isFireworksRunning) {
            particles = [];
            ctx.clearRect(0, 0, canvas.width, canvas.height);
          }
        }, 500);
      }

      // ========== FUNGSI PENCARIAN NISN ==========
      function displayGraduationMessage(studentName) {
        stopFireworks();
        
        resultArea.innerHTML = '';
        
        const nameDiv = document.createElement('div');
        nameDiv.className = 'student-name';
        nameDiv.textContent = studentName;
        resultArea.appendChild(nameDiv);

        const messageContainer = document.createElement('div');
        messageContainer.className = 'graduation-message';
        resultArea.appendChild(messageContainer);

        const fullSentence = "selamat anda lulus dari SMAN 1 Pangkalan Lesung";
        const words = fullSentence.split(' ');
        let wordIndex = 0;
        
        setTimeout(() => {
          messageContainer.classList.add('show');
        }, 50);

        function appendNextWord() {
          if (wordIndex < words.length) {
            const wordSpan = document.createElement('span');
            wordSpan.className = 'word-by-word';
            wordSpan.textContent = words[wordIndex];
            messageContainer.appendChild(wordSpan);
            wordIndex++;
            setTimeout(appendNextWord, 320);
          } else {
            setTimeout(() => {
              startFireworks();
            }, 500);
          }
        }

        appendNextWord();
      }

      function showError(message) {
        stopFireworks();
        resultArea.innerHTML = `<div class="error-message">⚠️ ${message}</div>`;
      }

      function handleSearch() {
        const nisnRaw = nisnInput.value.trim();
        
        if (nisnRaw === '') {
          showError('NISN tidak boleh kosong.');
          return;
        }

        const studentName = studentData[nisnRaw];
        
        if (studentName) {
          displayGraduationMessage(studentName);
        } else {
          showError('NISN tidak ditemukan. Silakan coba lagi.');
        }
      }

      searchBtn.addEventListener('click', handleSearch);

      nisnInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
          e.preventDefault();
          handleSearch();
        }
      });

      console.log('✅ Website siap!');
      console.log('🔍 Masukkan NISN lalu klik Cari atau tekan Enter.');
      console.log('🎆 Kembang api akan muncul setelah kalimat kelulusan selesai.');
      
      window.testFireworks = function() {
        console.log('Meluncurkan kembang api test...');
        startFireworks();
      };
      
    })();
  </script>
</body>
</html>
